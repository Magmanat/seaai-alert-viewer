<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEAAI Full Viewer Login</title>
    <link rel="icon" href="/static/assets/favicon.jpg" type="image/jpeg" />
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0c1118; color: #f8fafc; }
      form { width: min(360px, calc(100vw - 32px)); padding: 28px; border: 1px solid #263243; border-radius: 18px; background: #121a25; box-shadow: 0 24px 80px rgba(0,0,0,.35); }
      h1 { margin: 0 0 8px; font-size: 24px; }
      p { margin: 0 0 24px; color: #94a3b8; }
      label { display: grid; gap: 8px; margin-bottom: 16px; color: #cbd5e1; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
      input { border: 1px solid #334155; border-radius: 10px; background: #0f172a; color: #f8fafc; padding: 12px 14px; font-size: 15px; }
      button { width: 100%; border: 0; border-radius: 10px; background: #3b82f6; color: white; padding: 12px; font-weight: 800; cursor: pointer; }
      .error { min-height: 20px; margin-top: 14px; color: #fca5a5; font-size: 13px; }
    </style>
  </head>
  <body>
    <form id="login-form">
      <h1>SEAAI Full Viewer</h1>
      <p>Sign in to view production alerts.</p>
      <label>Username <input id="username" autocomplete="username" required /></label>
      <label>Password <input id="password" type="password" autocomplete="current-password" required /></label>
      <button type="submit">Sign in</button>
      <div id="error" class="error"></div>
    </form>
    <script>
      document.getElementById("login-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const error = document.getElementById("error");
        error.textContent = "";
        const response = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value,
          }),
        });
        if (!response.ok) {
          error.textContent = "Invalid username or password";
          return;
        }
        window.location.href = "/";
      });
    </script>
  </body>
</html>
