<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEAAI Live Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/static/assets/favicon.jpg" type="image/jpeg" />
    <link rel="stylesheet" href="/static/styles.css?v=20260622" />
  </head>
  <body>
    <main class="appShell">
      <section class="mapPanel">
        <header class="mapHeader header">
          <div class="title">Tracking Map</div>
          <div class="mapHeaderMeta">
            <div class="subtleLabel">Past 1 minute</div>
            <div id="track-count" class="countBadge">0</div>
          </div>
        </header>
        <div id="map-root" class="mapContainer">
          <div id="map-stage" class="mapStage">
            <svg id="map-svg" class="mapSvg" aria-hidden="true"></svg>
            <div id="map-overlay" class="mapOverlay"></div>
          </div>
          <div class="compass" aria-hidden="true">
            <svg viewBox="0 0 40 40" class="compassSvg">
              <circle cx="20" cy="20" r="18" class="compassBg" />
              <polygon points="20,4 16,20 20,17 24,20" class="compassNorth" />
              <polygon points="20,36 16,20 20,23 24,20" class="compassSouth" />
              <text x="20" y="14" class="compassLabel">N</text>
            </svg>
          </div>
          <div id="map-empty" class="mapEmptyState">
            Waiting for SEAAI detections...
          </div>
        </div>
      </section>

      <aside class="panelContainer open">
        <section class="panel alertsPanel">
          <header class="header alertsHeader">
            <div class="titleRow">
              <h1 class="title alertTitle">Alerts</h1>
              <div id="alert-count" class="countBadge">0</div>
            </div>
            <div class="headerActions">
              <button id="push-demo-alert" class="headerActionButton" type="button">
                Push demo alert
              </button>
              <button id="clear-alerts" class="clearAlertsButton" type="button">
                Clear alerts
              </button>
            </div>
          </header>
          <div class="panelMeta connectionMeta">
            <input
              id="upstream-url"
              class="upstreamUrlInput"
              type="text"
              spellcheck="false"
              placeholder="ws://host:port/path"
              aria-label="Upstream websocket URL"
            />
            <button id="apply-upstream-url" class="headerActionButton" type="button">
              Connect
            </button>
            <div id="status-pill" class="statusPill disconnected">
              <span class="statusDot"></span>
              <span id="status-label">Disconnected</span>
            </div>
          </div>
          <div id="filter-panel" class="panelMeta filterPanel">
            <div class="filterGroup">
              <span class="filterLabel">Bearing</span>
              <label class="filterOption">
                <input type="checkbox" name="bearing" value="Approaching" />
                <span>Approaching</span>
              </label>
              <label class="filterOption">
                <input type="checkbox" name="bearing" value="Departing" />
                <span>Departing</span>
              </label>
              <label class="filterOption">
                <input type="checkbox" name="bearing" value="Lateral Crossing" />
                <span>Lateral crossing</span>
              </label>
            </div>
            <div class="filterGroup">
              <span class="filterLabel">Classification</span>
              <label class="filterOption">
                <input type="checkbox" name="type" value="vessel" />
                <span>Vessel</span>
              </label>
              <label class="filterOption">
                <input type="checkbox" name="type" value="swimmer" />
                <span>Swimmer</span>
              </label>
              <label class="filterOption">
                <input type="checkbox" name="type" value="human" />
                <span>Human</span>
              </label>
            </div>
          </div>
          <div class="panelMeta">
            <span id="last-message">No messages received yet</span>
          </div>
          <div id="alerts-list" class="alertsList"></div>
          <div id="alerts-empty" class="emptyState">
            Waiting for detections...
          </div>
        </section>
      </aside>
    </main>

    <div id="alert-modal" class="modalOverlay" hidden aria-hidden="true">
      <div
        class="modalShell"
        role="dialog"
        aria-modal="true"
        aria-label="Alert image viewer"
      >
        <div id="modal-view-toggle" class="modalViewToggle" hidden></div>
        <button
          id="modal-close"
          class="modalCloseButton"
          type="button"
          aria-label="Close modal"
        >
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>

        <div id="modal-image-container" class="modalImageContainer">
          <div id="modal-zoom-wrapper" class="modalZoomWrapper" hidden>
            <img id="modal-image" class="modalImage" alt="Alert detail" />
            <div id="modal-bounding-box" class="modalBoundingBox" hidden>
              <div class="modalCorner modalCornerTopLeft"></div>
              <div class="modalCorner modalCornerTopRight"></div>
              <div class="modalCorner modalCornerBottomLeft"></div>
              <div class="modalCorner modalCornerBottomRight"></div>
            </div>
          </div>

          <div id="modal-empty" class="modalNoImage" hidden>
            No image available for this alert
          </div>
        </div>
      </div>
    </div>

    <script src="/static/app.js?v=20260622" defer></script>
  </body>
</html>
