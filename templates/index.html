<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEAAI Live Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="appShell">
      <section class="mapPanel">
        <header class="mapHeader header">
          <div class="title">Tracking Map</div>
          <div class="mapHeaderMeta">
            <div class="subtleLabel">Past 1 minute</div>
            <div id="track-count" class="countBadge">0</div>
          </div>
        </header>
        <div id="map-root" class="mapContainer">
          <svg id="map-svg" class="mapSvg" aria-hidden="true"></svg>
          <div id="map-overlay" class="mapOverlay"></div>
          <div class="compass" aria-hidden="true">
            <svg viewBox="0 0 40 40" class="compassSvg">
              <circle cx="20" cy="20" r="18" class="compassBg" />
              <polygon points="20,4 16,20 20,17 24,20" class="compassNorth" />
              <polygon points="20,36 16,20 20,23 24,20" class="compassSouth" />
              <text x="20" y="14" class="compassLabel">N</text>
            </svg>
          </div>
          <div id="map-empty" class="mapEmptyState">
            Waiting for SEAAI detections...
          </div>
        </div>
      </section>

      <aside class="panelContainer open">
        <section class="panel alertsPanel">
          <header class="header alertsHeader">
            <div class="titleRow">
              <h1 class="title alertTitle">Alerts</h1>
              <div id="alert-count" class="countBadge">0</div>
            </div>
            <div class="headerActions">
              <div id="status-pill" class="statusPill disconnected">
                <span class="statusDot"></span>
                <span id="status-label">Disconnected</span>
              </div>
            </div>
          </header>
          <div class="panelMeta">
            <span id="last-message">No messages received yet</span>
          </div>
          <div id="alerts-list" class="alertsList"></div>
          <div id="alerts-empty" class="emptyState">
            Waiting for detections...
          </div>
        </section>
      </aside>
    </main>

    <div id="alert-modal" class="modalOverlay" hidden aria-hidden="true">
      <div
        class="modalShell"
        role="dialog"
        aria-modal="true"
        aria-label="Alert image viewer"
      >
        <div id="modal-view-toggle" class="modalViewToggle" hidden></div>
        <button
          id="modal-close"
          class="modalCloseButton"
          type="button"
          aria-label="Close modal"
        >
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>

        <div id="modal-image-container" class="modalImageContainer">
          <div id="modal-zoom-wrapper" class="modalZoomWrapper" hidden>
            <img id="modal-image" class="modalImage" alt="Alert detail" />
            <div id="modal-bounding-box" class="modalBoundingBox" hidden>
              <div class="modalCorner modalCornerTopLeft"></div>
              <div class="modalCorner modalCornerTopRight"></div>
              <div class="modalCorner modalCornerBottomLeft"></div>
              <div class="modalCorner modalCornerBottomRight"></div>
            </div>
          </div>

          <div id="modal-empty" class="modalNoImage">
            No image available for this alert
          </div>
        </div>
      </div>
    </div>

    <script src="/static/app.js" defer></script>
  </body>
</html>
